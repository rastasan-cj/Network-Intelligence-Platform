# Apache Virtual Host Configuration for 249-NIP Backend
# استخدم هذا الملف في بيئة الإنتاج مع Apache

<VirtualHost *:80>
    ServerName api.249nip.local
    DocumentRoot /var/www/249-nip/backend/public

    <Directory /var/www/249-nip/backend/public>
        AllowOverride All
        Require all granted
        Options -Indexes +FollowSymLinks
    </Directory>

    # PHP 8.3/8.4 FPM
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php/php8.3-fpm.sock|fcgi://localhost"
    </FilesMatch>

    # Security Headers
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"

    # CORS handled by PHP — do not add duplicate headers here

    ErrorLog ${APACHE_LOG_DIR}/nip-error.log
    CustomLog ${APACHE_LOG_DIR}/nip-access.log combined
</VirtualHost>
